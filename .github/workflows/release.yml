name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
            artifact: preso-darwin-arm64
          - target: darwin-x64
            os: macos-13
            artifact: preso-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            artifact: preso-linux-x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            artifact: preso-linux-arm64
          - target: windows-x64
            os: windows-latest
            artifact: preso-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          bun build --compile --minify --target=bun-${{ matrix.target }} \
            --define=BUILD_VERSION="\"$VERSION\"" \
            ./src/cli/index.ts --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: PRESO ${{ github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/preso-darwin-arm64
            dist/preso-darwin-x64
            dist/preso-linux-x64
            dist/preso-linux-arm64
            dist/preso-windows-x64.exe
            dist/checksums.txt

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts for checksums
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          cd dist
          echo "darwin_arm64=$(sha256sum preso-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_x64=$(sha256sum preso-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum preso-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum preso-linux-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          
          # Create formula from template
          sed -e "s/VERSION_PLACEHOLDER/$VERSION/g" \
              -e "s/SHA256_DARWIN_ARM64_PLACEHOLDER/${{ steps.checksums.outputs.darwin_arm64 }}/g" \
              -e "s/SHA256_DARWIN_X64_PLACEHOLDER/${{ steps.checksums.outputs.darwin_x64 }}/g" \
              -e "s/SHA256_LINUX_ARM64_PLACEHOLDER/${{ steps.checksums.outputs.linux_arm64 }}/g" \
              -e "s/SHA256_LINUX_X64_PLACEHOLDER/${{ steps.checksums.outputs.linux_x64 }}/g" \
              Formula/preso.rb.template > Formula/preso.rb
          
          cat Formula/preso.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/preso.rb
          git commit -m "Update Homebrew formula to ${{ needs.release.outputs.version }}"
          git push
