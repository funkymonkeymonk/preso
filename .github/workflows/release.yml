name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          # Get latest tag or default to 0.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION="${LATEST_TAG#v}"
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag push - use the tag directly
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Manual dispatch - bump version
            CURRENT="${{ steps.current.outputs.current }}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            
            case "${{ github.event.inputs.bump }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
            artifact: preso-darwin-arm64
          - target: darwin-x64
            os: macos-latest
            artifact: preso-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            artifact: preso-linux-x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            artifact: preso-linux-arm64
          - target: windows-x64
            os: windows-latest
            artifact: preso-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build binary
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          bun build --compile --minify --target=bun-${{ matrix.target }} --define=BUILD_VERSION="\"$VERSION\"" ./src/cli/index.ts --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare.outputs.tag }}" -m "Release ${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

      - name: Get previous tag
        id: prev_tag
        run: |
          # Get the tag before the current one
          CURRENT_TAG="${{ needs.prepare.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        id: checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
          
          echo "darwin_arm64=$(sha256sum preso-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_x64=$(sha256sum preso-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum preso-linux-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum preso-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "windows_x64=$(sha256sum preso-windows-x64.exe | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Get binary sizes
        id: sizes
        run: |
          cd dist
          echo "darwin_arm64=$(du -m preso-darwin-arm64 | cut -f1)MB" >> $GITHUB_OUTPUT
          echo "darwin_x64=$(du -m preso-darwin-x64 | cut -f1)MB" >> $GITHUB_OUTPUT
          echo "linux_x64=$(du -m preso-linux-x64 | cut -f1)MB" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(du -m preso-linux-arm64 | cut -f1)MB" >> $GITHUB_OUTPUT
          echo "windows_x64=$(du -m preso-windows-x64.exe | cut -f1)MB" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          if [[ -n "$PREV_TAG" ]]; then
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges >> changelog.md
          else
            echo "## Initial Release" > changelog.md
            echo "" >> changelog.md
            echo "First release of PRESO CLI." >> changelog.md
          fi

      - name: Generate release body
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          
          cat > release_body.md << 'EOF'
          ## Installation

          ### Homebrew (Recommended)

          ```bash
          brew install funkymonkeymonk/preso/preso
          ```

          ### Manual Download

          | Platform | Binary | Size | SHA256 |
          |----------|--------|------|--------|
          | macOS Apple Silicon | [preso-darwin-arm64](https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-darwin-arm64) | SIZE_DARWIN_ARM64 | `SHA_DARWIN_ARM64` |
          | macOS Intel | [preso-darwin-x64](https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-darwin-x64) | SIZE_DARWIN_X64 | `SHA_DARWIN_X64` |
          | Linux x64 | [preso-linux-x64](https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-linux-x64) | SIZE_LINUX_X64 | `SHA_LINUX_X64` |
          | Linux ARM64 | [preso-linux-arm64](https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-linux-arm64) | SIZE_LINUX_ARM64 | `SHA_LINUX_ARM64` |
          | Windows x64 | [preso-windows-x64.exe](https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-windows-x64.exe) | SIZE_WINDOWS_X64 | `SHA_WINDOWS_X64` |

          ### Quick Install (macOS/Linux)

          ```bash
          curl -fsSL https://github.com/funkymonkeymonk/preso/releases/download/TAG_PLACEHOLDER/preso-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m | sed 's/x86_64/x64/' | sed 's/aarch64/arm64/') -o preso
          chmod +x preso
          sudo mv preso /usr/local/bin/
          ```

          ### Verify Installation

          ```bash
          preso --version
          # Expected: VERSION_PLACEHOLDER
          ```

          EOF
          
          # Replace placeholders
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" release_body.md
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" release_body.md
          sed -i "s/SHA_DARWIN_ARM64/${{ steps.checksums.outputs.darwin_arm64 }}/g" release_body.md
          sed -i "s/SHA_DARWIN_X64/${{ steps.checksums.outputs.darwin_x64 }}/g" release_body.md
          sed -i "s/SHA_LINUX_X64/${{ steps.checksums.outputs.linux_x64 }}/g" release_body.md
          sed -i "s/SHA_LINUX_ARM64/${{ steps.checksums.outputs.linux_arm64 }}/g" release_body.md
          sed -i "s/SHA_WINDOWS_X64/${{ steps.checksums.outputs.windows_x64 }}/g" release_body.md
          sed -i "s/SIZE_DARWIN_ARM64/${{ steps.sizes.outputs.darwin_arm64 }}/g" release_body.md
          sed -i "s/SIZE_DARWIN_X64/${{ steps.sizes.outputs.darwin_x64 }}/g" release_body.md
          sed -i "s/SIZE_LINUX_X64/${{ steps.sizes.outputs.linux_x64 }}/g" release_body.md
          sed -i "s/SIZE_LINUX_ARM64/${{ steps.sizes.outputs.linux_arm64 }}/g" release_body.md
          sed -i "s/SIZE_WINDOWS_X64/${{ steps.sizes.outputs.windows_x64 }}/g" release_body.md
          
          # Append changelog
          echo "" >> release_body.md
          cat changelog.md >> release_body.md
          
          cat release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: PRESO ${{ needs.prepare.outputs.tag }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            dist/preso-darwin-arm64
            dist/preso-darwin-x64
            dist/preso-linux-x64
            dist/preso-linux-arm64
            dist/preso-windows-x64.exe
            dist/checksums.txt

  homebrew:
    name: Update Homebrew Formula
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts for checksums
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          cd dist
          echo "darwin_arm64=$(sha256sum preso-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_x64=$(sha256sum preso-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum preso-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_x64=$(sha256sum preso-linux-x64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          
          sed -e "s/VERSION_PLACEHOLDER/$VERSION/g" \
              -e "s/SHA256_DARWIN_ARM64_PLACEHOLDER/${{ steps.checksums.outputs.darwin_arm64 }}/g" \
              -e "s/SHA256_DARWIN_X64_PLACEHOLDER/${{ steps.checksums.outputs.darwin_x64 }}/g" \
              -e "s/SHA256_LINUX_ARM64_PLACEHOLDER/${{ steps.checksums.outputs.linux_arm64 }}/g" \
              -e "s/SHA256_LINUX_X64_PLACEHOLDER/${{ steps.checksums.outputs.linux_x64 }}/g" \
              Formula/preso.rb.template > Formula/preso.rb
          
          cat Formula/preso.rb

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/preso.rb
          git commit -m "Update Homebrew formula to ${{ needs.prepare.outputs.version }}" || echo "No changes to commit"
          git push || echo "Nothing to push"
